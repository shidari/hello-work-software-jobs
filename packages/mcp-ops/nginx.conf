# sho-mcp-ops の前段 reverse proxy。
# Claude (dev sandbox) が SSE で叩く 7001 / 7002 / 7003 を nginx で受け、
# 127.0.0.1:7011 / 7012 / 7013 で動かす mcp-proxy に流す。limit_req で簡易レート制限。
#
# rate の目安:
#   gh:      GitHub PAT は 5000 req/hour (~83 r/min)。30 r/m に絞れば暴走しても
#            本物の API rate limit を食らう前に 429 が返って気付ける。
#   aws:     CloudWatch Logs は throttle が緩いが、保険として 60 r/m。
#   aws_api: SQS / Lambda / EventBridge 等の生 AWS API。同じく 60 r/m。
# 値を変えたい時は zone 行の rate= と location の burst= を直接編集する。
#
# limit_req は POST 系のツール呼び出しに効く。SSE GET (/sse) は接続確立 1 回で
# あとは server-push なので、burst を食い潰さない。

# minimal image なので user は root しか居ない (extraCommands で /etc/passwd は
# root エントリだけ生成)。nginx の compile-default worker user "nobody" だと
# getpwnam で死ぬので明示的に root を指定する。
user root;

# nginx prefix (-p) を /tmp/nginx-prefix にして、起動時に必要な相対 path の
# 書き込み先 (logs/ 等) を ephemeral container fs に逃がす。pid / error_log は
# config 読み込み後に効くので、cmdline -e /dev/stderr で起動時 default も塞ぐ。
pid /tmp/nginx-prefix/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 256;
}

http {
  # tmp_path 群を /tmp 配下に逃がす。nix store は read-only。
  client_body_temp_path /tmp/nginx-prefix/client_body;
  proxy_temp_path       /tmp/nginx-prefix/proxy;
  fastcgi_temp_path     /tmp/nginx-prefix/fastcgi;
  uwsgi_temp_path       /tmp/nginx-prefix/uwsgi;
  scgi_temp_path        /tmp/nginx-prefix/scgi;

  # 3 zone: github は PAT rate limit が厳しめなので強めに絞る。
  limit_req_zone $binary_remote_addr zone=gh:1m      rate=30r/m;
  limit_req_zone $binary_remote_addr zone=aws:1m     rate=60r/m;
  limit_req_zone $binary_remote_addr zone=aws_api:1m rate=60r/m;
  # 上限を超えた時は 429 を返して即座にクライアントに伝える (default 503)。
  limit_req_status 429;

  # SSE を素通しするための最低限の設定。proxy_buffering off にしないと
  # event がバッファに溜まって Claude 側にイベントが届かない。
  proxy_http_version 1.1;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   Connection        "";
  proxy_buffering    off;
  proxy_cache        off;
  proxy_read_timeout 1h;
  proxy_send_timeout 1h;

  # upstream (127.0.0.1:7011-7013) との TCP 接続にも SO_KEEPALIVE を効かせる。
  # mcp-proxy が abrupt に死んだ時に nginx 側が dead connection を握り続けないため。
  proxy_socket_keepalive on;

  log_format ops '$remote_addr "$request" $status req=$request_time';
  access_log /dev/stdout ops;

  # listen に so_keepalive を入れて accept された socket に TCP keepalive を継承させる。
  # Claude (dev sandbox) が abrupt に死ぬ / network blip 等で client socket が dead に
  # なった場合、Linux default の tcp_keepalive_time=7200s では検出が遅すぎ、また
  # SSE は long-lived なので proxy_read_timeout 1h まで ESTABLISHED が残り続ける。
  # 30s:30s:4 → idle 30s 後に probe 開始、30s 間隔で 4 回失敗 → 約 2.5 分で切断。
  # これで dev sandbox 再起動や Claude Code クラッシュ時の接続漏れが 1h → 2.5min に短縮される。
  server {
    listen 7001 so_keepalive=30s:30s:4;
    server_name _;
    location / {
      # burst=10 nodelay: 10 req まではバースト許容、それを超えると即 429。
      limit_req zone=gh burst=10 nodelay;
      proxy_pass http://127.0.0.1:7011;
    }
  }

  server {
    listen 7002 so_keepalive=30s:30s:4;
    server_name _;
    location / {
      limit_req zone=aws burst=20 nodelay;
      proxy_pass http://127.0.0.1:7012;
    }
  }

  server {
    listen 7003 so_keepalive=30s:30s:4;
    server_name _;
    location / {
      limit_req zone=aws_api burst=20 nodelay;
      proxy_pass http://127.0.0.1:7013;
    }
  }
}
