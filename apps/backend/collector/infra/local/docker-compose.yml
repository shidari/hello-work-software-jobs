services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEFAULT_REGION: ap-northeast-1
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN}

  sqs-setup:
    image: amazon/aws-cli:latest
    depends_on:
      localstack:
        condition: service_started
    entrypoint: ["/setup-sqs.sh"]
    volumes:
      - ./setup-sqs.sh:/setup-sqs.sh:ro
    environment:
      SQS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: ap-northeast-1

  job-number-crawler:
    build:
      context: ../../../../..
      dockerfile: apps/backend/collector/infra/Dockerfile
    ports:
      - "9000:8080"
    environment:
      SQS_QUEUE_URL: http://localstack:4566/000000000000/job-detail-queue
      SQS_ENDPOINT_URL: http://localstack:4566
      JOB_STORE_ENDPOINT: http://host.docker.internal:8787
      API_KEY: dev-secret
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: ap-northeast-1
    command:
      - apps/backend/collector/dist/job-number-handler.handler
    depends_on:
      sqs-setup:
        condition: service_completed_successfully

  job-detail-etl:
    build:
      context: ../../../../..
      dockerfile: apps/backend/collector/infra/Dockerfile
    ports:
      - "9001:8080"
    environment:
      JOB_STORE_ENDPOINT: http://host.docker.internal:8787
      API_KEY: dev-secret
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: ap-northeast-1
    command:
      - apps/backend/collector/dist/job-detail-handler.handler
    depends_on:
      localstack:
        condition: service_started
