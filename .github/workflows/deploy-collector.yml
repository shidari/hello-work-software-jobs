name: Deploy Collector

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/collector/**"
      - "packages/models/**"
      - ".github/workflows/deploy-collector.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@58e6119fe4f3092a76a7771efb55e04d25b6b26f

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @sho/models build

      - name: Build collector
        run: pnpm --filter collector build

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: github-actions-cdk-deploy
          aws-region: ap-northeast-1

      - name: CDK Deploy
        working-directory: ./apps/backend/collector/infra
        env:
          JOB_STORE_ENDPOINT: ${{ secrets.JOB_STORE_ENDPOINT }}
          API_KEY: ${{ secrets.API_KEY }}
        run: pnpm exec cdk deploy --all --require-approval never
