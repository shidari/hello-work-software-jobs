name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    env:
      JOB_STORE_ENDPOINT: ${{ secrets.JOB_STORE_ENDPOINT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@58e6119fe4f3092a76a7771efb55e04d25b6b26f

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Type check
        run: pnpm -r exec tsc --noEmit
        continue-on-error: false

      - name: Knip (unused files / exports / deps)
        run: pnpm exec knip
        continue-on-error: false

      - name: Install Playwright chromium (collector fixture tests + frontend Storybook)
        run: pnpm dlx playwright@1.59.1 install --with-deps chromium

      - name: Run tests with coverage
        run: pnpm -r test --coverage --coverage.reporter=json --coverage.reporter=json-summary
        continue-on-error: false

      - name: Frontend Storybook tests
        working-directory: ./apps/frontend/hello-work-job-searcher
        run: pnpm test:storybook

      - name: Coverage report - api
        if: always()
        uses: davelosert/vitest-coverage-report-action@3c50566c523e04813df28de8f7c48dd97d663f1c # v2
        with:
          name: api
          working-directory: apps/backend/api

      - name: Coverage report - collector
        if: always()
        uses: davelosert/vitest-coverage-report-action@3c50566c523e04813df28de8f7c48dd97d663f1c # v2
        with:
          name: collector
          working-directory: apps/backend/collector

      - name: Coverage report - collector-infra
        if: always()
        uses: davelosert/vitest-coverage-report-action@3c50566c523e04813df28de8f7c48dd97d663f1c # v2
        with:
          name: collector-infra
          working-directory: apps/backend/collector/infra

      - name: CDK synth (dry-run)
        working-directory: ./apps/backend/collector/infra
        env:
          JOB_STORE_ENDPOINT: https://example.com
          API_KEY: dummy
        run: pnpm exec cdk synth --quiet

      - name: Lint & Format check
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.css')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs pnpm exec biome check --no-errors-on-unmatched
          else
            echo "No changed files to lint"
          fi
