name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    env:
      JOB_STORE_ENDPOINT: ${{ secrets.JOB_STORE_ENDPOINT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Type check
        run: pnpm -r exec tsc --noEmit
        continue-on-error: false
      
      - name: Run tests
        run: pnpm run test
        continue-on-error: false
        
      - name: Lint & Format check
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.css')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs pnpm exec biome check --no-errors-on-unmatched
          else
            echo "No changed files to lint"
          fi
