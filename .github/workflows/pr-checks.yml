name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    env:
      JOB_STORE_ENDPOINT: ${{ secrets.JOB_STORE_ENDPOINT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@58e6119fe4f3092a76a7771efb55e04d25b6b26f

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Type check
        run: pnpm -r exec tsc --noEmit
        continue-on-error: false
      
      - name: Run tests
        run: pnpm run test
        continue-on-error: false
        
      - name: CDK synth (dry-run)
        working-directory: ./apps/backend/collector/infra
        env:
          JOB_STORE_ENDPOINT: https://example.com
          API_KEY: dummy
        run: pnpm exec cdk synth --quiet

      - name: Lint & Format check
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.css')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs pnpm exec biome check --no-errors-on-unmatched
          else
            echo "No changed files to lint"
          fi

  storybook-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@58e6119fe4f3092a76a7771efb55e04d25b6b26f

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        working-directory: ./apps/frontend/hello-work-job-searcher
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Storybook browser tests
        working-directory: ./apps/frontend/hello-work-job-searcher
        run: pnpm test:storybook
